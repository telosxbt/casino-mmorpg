<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="./src/ui/casino.css">
<style>body{margin:0;background:#0b0b12;display:flex;flex-wrap:wrap;gap:30px;justify-content:center;padding:30px;align-items:flex-start}.cz-frame{position:relative!important;left:auto!important;transform:none!important}</style>
</head><body>

<!-- SLOTS -->
<div class="cz-frame" style="width:420px">
  <div class="cz-title">Slot Machine</div>
  <div class="cz-box" style="margin:0 auto 12px;max-width:220px"><div class="cz-box-label">✦ JACKPOT ✦</div><div class="cz-box-val" style="font-size:24px">10,000 🪙</div></div>
  <div class="cz-reels"><div class="cz-reel">🍒</div><div class="cz-reel">7️⃣</div><div class="cz-reel">🔔</div></div>
  <div class="cz-row" style="margin-top:16px;justify-content:space-between">
    <div class="cz-box"><div class="cz-box-label">BET</div><div class="cz-row" style="gap:8px"><button class="cz-btn cz-btn--dark" style="padding:2px 10px">◀</button><span class="cz-box-val">100</span><button class="cz-btn cz-btn--dark" style="padding:2px 10px">▶</button></div></div>
    <button class="cz-btn" style="font-size:22px;padding:14px 28px">SPIN</button>
    <div class="cz-box"><div class="cz-box-label">WIN</div><div class="cz-box-val" style="color:#ffe07a">250</div></div>
  </div>
</div>

<!-- BLACKJACK -->
<div class="cz-frame" style="width:560px">
  <div class="cz-title">Blackjack</div>
  <div class="cz-felt">
    <div class="cz-row" style="justify-content:space-between;align-items:flex-start">
      <div style="flex:1"><div style="font-size:11px;letter-spacing:2px;color:#bfe6cd;margin-bottom:4px">DEALER</div>
        <div class="cz-row" style="justify-content:flex-start;min-height:70px">
          <div class="cz-card red"><span class="cz-card-tl">8♥</span><span>♥</span><span class="cz-card-tr">8♥</span></div>
          <div class="cz-card"><span class="cz-card-tl">6♣</span><span>♣</span><span class="cz-card-tr">6♣</span></div>
        </div></div>
      <div class="cz-box"><div class="cz-box-label">DEALER</div><div class="cz-box-val">14</div></div>
    </div>
    <div style="text-align:center;color:#bfe6cd;letter-spacing:2px;font-size:12px;margin:8px 0">❖ BLACKJACK PAYS 3 TO 2 ❖</div>
    <div class="cz-row" style="justify-content:space-between;align-items:flex-start">
      <div style="flex:1"><div style="font-size:11px;letter-spacing:2px;color:#bfe6cd;margin-bottom:4px">PLAYER <span style="color:#ffe07a">● your turn</span></div>
        <div class="cz-row" style="justify-content:flex-start;min-height:70px">
          <div class="cz-card red"><span class="cz-card-tl">K♦</span><span>♦</span><span class="cz-card-tr">K♦</span></div>
          <div class="cz-card"><span class="cz-card-tl">7♠</span><span>♠</span><span class="cz-card-tr">7♠</span></div>
        </div></div>
      <div class="cz-box"><div class="cz-box-label">PLAYER</div><div class="cz-box-val">17</div></div>
    </div>
  </div>
  <div class="cz-row" style="margin-top:14px;justify-content:center">
    <button class="cz-btn">👆 Hit</button><button class="cz-btn">✋ Stand</button><button class="cz-btn cz-btn--dark">Double</button>
  </div>
</div>

<!-- ROULETTE -->
<div class="cz-frame" style="width:680px" id="rl"></div>

<script>
const RED=new Set([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36]);
const cc=n=>n===0?'cz-rl-green':RED.has(n)?'cz-rl-red':'cz-rl-black';
let g='<div class="cz-rl-grid">';
g+='<div class="cz-rl-cell cz-rl-green cz-rl-zero" style="grid-column:1;grid-row:1 / span 3">0</div>';
for(let c=1;c<=12;c++)g+=`<div class="cz-rl-cell ${cc(c*3)}" style="grid-column:${c+1};grid-row:1">${c*3}</div>`;
for(let c=1;c<=12;c++)g+=`<div class="cz-rl-cell ${cc(c*3-1)}" style="grid-column:${c+1};grid-row:2">${c*3-1}</div>`;
for(let c=1;c<=12;c++)g+=`<div class="cz-rl-cell ${cc(c*3-2)}" style="grid-column:${c+1};grid-row:3">${c*3-2}</div>`;
for(let r=1;r<=3;r++)g+=`<div class="cz-rl-cell cz-rl-out" style="grid-column:14;grid-row:${r}">2:1</div>`;
g+='</div>';
g+='<div style="display:grid;grid-template-columns:40px repeat(3,1fr) 44px;gap:3px;margin-top:3px"><div></div><div class="cz-rl-cell cz-rl-out">1st 12</div><div class="cz-rl-cell cz-rl-out">2nd 12</div><div class="cz-rl-cell cz-rl-out">3rd 12</div><div></div></div>';
g+='<div style="display:grid;grid-template-columns:40px repeat(6,1fr) 44px;gap:3px;margin-top:3px"><div></div><div class="cz-rl-cell cz-rl-out">1-18</div><div class="cz-rl-cell cz-rl-out">EVEN</div><div class="cz-rl-cell cz-rl-red">◆</div><div class="cz-rl-cell cz-rl-black">◆</div><div class="cz-rl-cell cz-rl-out">ODD</div><div class="cz-rl-cell cz-rl-out">19-36</div><div></div></div>';
document.getElementById('rl').innerHTML=
 '<div class="cz-title">Roulette</div>'+
 '<div class="cz-row" style="align-items:stretch;gap:14px"><div class="cz-wheel"><div class="cz-wheel-hub"></div><div class="cz-wheel-num" style="color:#7bf3a6">19</div></div>'+
 '<div class="cz-felt" style="flex:1;padding:10px">'+g+'</div></div>'+
 '<div class="cz-row" style="margin-top:14px;justify-content:space-between">'+
 '<div class="cz-box"><div class="cz-box-label">BALANCE</div><div class="cz-box-val">12,345</div></div>'+
 '<div class="cz-box"><div class="cz-box-label">STAKED</div><div class="cz-box-val">250</div></div>'+
 '<div class="cz-box" style="min-width:130px"><div class="cz-box-label">BETTING · 12s</div><div class="cz-box-val">🎯</div></div>'+
 '<div class="cz-box"><div class="cz-box-label">SEATS</div><div class="cz-box-val">3/8</div></div></div>'+
 '<div class="cz-row" style="margin-top:12px"><span style="font-size:11px;letter-spacing:2px;color:#e9cf8e">CHOOSE CHIP</span>'+
 ['#c0c0c0','#d23b3b','#2f6fd2','#2faa5a','#7a4fd2','#caa23a'].map((c,i)=>`<button class="cz-chip" data-on="${i===2}" style="color:${c}">${[10,50,100,500,'1K','5K'][i]}</button>`).join('')+'</div>';
</script>
</body></html>
EOF
echo "wrote preview.html"
